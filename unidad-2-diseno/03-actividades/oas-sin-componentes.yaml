openapi: 3.0.4
info:
  title: Product Catalog API           # Nombre de tu API
  description: API REST para gestión de catálogo de productos de e-commerce
  version: 1.0.0                      # Versión de tu API
  contact:
    name: ITQ distributed and cloud systems
    email: ivonne.al@queretaro.tecnm.mx
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo
  - url: https://api.ecommerce.com/api/v1
    description: Servidor de producción

tags:
  - name: products
    description: Operaciones relacionadas con catálogo de productos

paths:
  /products:        # Ruta del endpoint
    post:           # Método HTTP
      summary: Crear nuevo producto
      description: Crea un nuevo producto en el catálogo
      operationId: createProduct        # ID único para generación de código
      tags:
        - products                      # Asociamos con el tag creado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
                - category
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: "Nombre del producto"
                  example: "Laptop Gaming"
                description:
                  type: string
                  maxLength: 1000
                  description: "Descripción detallada del producto"
                  example: "Laptop de alto rendimiento para gaming"
                price:
                  type: number
                  format: double
                  minimum: 0
                  description: "Precio del producto en USD"
                  example: 1299.99
                category:
                  type: string
                  enum: ["Electronics", "Clothing", "Books", "Home", "Sports"]
                  description: "Categoría del producto"
                  example: "Electronics"
                inStock:
                  type: boolean
                  description: "Indica si el producto está disponible"
                  example: true
                  default: true
              # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Producto creado exitosamente
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - price
                  - category
                  - inStock
                  - sku
                  - createdAt
                properties:
                  id:
                    type: string
                    pattern: '^prod-[0-9]+$'
                    description: "ID único del producto"
                    example: "prod-12345"
                  name:
                    type: string
                    minLength: 1
                    maxLength: 200
                    description: "Nombre del producto"
                    example: "Laptop Gaming"
                  price:
                    type: number
                    format: double
                    minimum: 0
                    description: "Precio del producto en USD"
                    example: 1299.99
                  category:
                    type: string
                    enum: ["Electronics", "Clothing", "Books", "Home", "Sports"]
                    description: "Categoría del producto"
                    example: "Electronics"
                  inStock:
                    type: boolean
                    description: "Indica si el producto está disponible"
                    example: true
                  sku:
                    type: string
                    description: "Código SKU del producto"
                    example: "LAP-GAM-001"
                  createdAt:
                    type: string
                    format: date-time
                    description: "Fecha y hora de creación"
                    example: "2024-01-15T10:30:00Z"
                  updatedAt:
                    type: string
                    format: date-time
                    description: "Fecha y hora de última actualización"
                    example: "2024-01-15T10:30:00Z"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    description: "Código de error"
                    example: "INVALID_INPUT"
                  message:
                    type: string
                    description: "Mensaje descriptivo del error"
                    example: "Los datos enviados no cumplen con el esquema."
                  timestamp:
                    type: string
                    format: date-time
                    description: "Fecha y hora del error"
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    description: "Ruta donde ocurrió el error"
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInvalidInput
        '409':
          description: Conflicto - producto ya existe
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    description: "Código de error"
                    example: "PRODUCT_EXISTS"
                  message:
                    type: string
                    description: "Mensaje descriptivo del error"
                    example: "El producto ya existe."
                  timestamp:
                    type: string
                    format: date-time
                    description: "Fecha y hora del error"
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    description: "Ruta donde ocurrió el error"
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorConflict
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    description: "Código de error"
                    example: "INTERNAL_ERROR"
                  message:
                    type: string
                    description: "Mensaje descriptivo del error"
                    example: "Ocurrió un error inesperado."
                  timestamp:
                    type: string
                    format: date-time
                    description: "Fecha y hora del error"
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    description: "Ruta donde ocurrió el error"
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInternal

    get:                                # Nueva operación en la misma ruta
      summary: Buscar productos
      description: Busca productos existentes basado en criterios
      operationId: searchProducts
      tags:
        - products
      parameters:
        - name: category
          in: query
          description: Categoría del producto
          required: false
          schema:
            type: string
            enum: ["Electronics", "Clothing", "Books", "Home", "Sports"]
          example: "Electronics"
        - name: minPrice
          in: query
          description: Precio mínimo del producto
          required: false
          schema:
            type: number
            format: double
            minimum: 0
          example: 100.00
        - name: maxPrice
          in: query
          description: Precio máximo del producto
          required: false
          schema:
            type: number
            format: double
            minimum: 0
          example: 2000.00
        - name: inStock
          in: query
          description: Solo productos en stock
          required: false
          schema:
            type: boolean
          example: true
        - name: page
          in: query
          description: Número de página (por defecto 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          description: Elementos por página (por defecto 20, máximo 100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        '200':
          description: Lista de productos encontrados (puede estar vacía)
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                        - price
                        - category
                        - inStock
                        - sku
                        - createdAt
                      properties:
                        id:
                          type: string
                          pattern: '^prod-[0-9]+$'
                          description: "ID único del producto"
                          example: "prod-12345"
                        name:
                          type: string
                          description: "Nombre del producto"
                          example: "Laptop Gaming"
                        price:
                          type: number
                          description: "Precio del producto en USD"
                          example: 1299.99
                        category:
                          type: string
                          description: "Categoría del producto"
                          example: "Electronics"
                        inStock:
                          type: boolean
                          description: "Indica si el producto está disponible"
                          example: true
                        sku:
                          type: string
                          description: "Código SKU del producto"
                          example: "LAP-GAM-001"
                        createdAt:
                          type: string
                          format: date-time
                          description: "Fecha y hora de creación"
                          example: "2024-01-15T10:30:00Z"
                        updatedAt:
                          type: string
                          format: date-time
                          description: "Fecha y hora de última actualización"
                          example: "2024-01-15T10:30:00Z"
                  pagination:
                    type: object
                    required:
                      - total
                      - page
                      - limit
                      - totalPages
                    properties:
                      total:
                        type: integer
                        example: 2
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 20
                      totalPages:
                        type: integer
                        example: 1
              # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/ProductList'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    example: "INVALID_INPUT"
                  message:
                    type: string
                    example: "Los datos enviados no cumplen con el esquema."
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInvalidInput
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    description: "Código de error"
                    example: "INTERNAL_ERROR"
                  message:
                    type: string
                    description: "Mensaje descriptivo del error"
                    example: "Ocurrió un error inesperado."
                  timestamp:
                    type: string
                    format: date-time
                    description: "Fecha y hora del error"
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    description: "Ruta donde ocurrió el error"
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInternal

  /products/{productId}:              # Ruta con parámetro dinámico
    get:
      summary: Obtener producto por ID
      description: Obtiene los detalles de un producto específico
      operationId: getProductById
      tags:
        - products
      parameters:
        - name: productId               # Parámetro de la ruta
          in: path                      # Ubicación: en la URL
          description: ID del producto a obtener
          required: true                # Los parámetros path son siempre obligatorios
          schema:
            type: string
            pattern: '^prod-[0-9]+$'
          example: "prod-12345"
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - price
                  - category
                  - inStock
                  - sku
                  - createdAt
                properties:
                  id:
                    type: string
                    pattern: '^prod-[0-9]+$'
                    description: "ID único del producto"
                    example: "prod-12345"
                  name:
                    type: string
                    description: "Nombre del producto"
                    example: "Laptop Gaming"
                  price:
                    type: number
                    description: "Precio del producto en USD"
                    example: 1299.99
                  category:
                    type: string
                    description: "Categoría del producto"
                    example: "Electronics"
                  inStock:
                    type: boolean
                    description: "Indica si el producto está disponible"
                    example: true
                  sku:
                    type: string
                    description: "Código SKU del producto"
                    example: "LAP-GAM-001"
                  createdAt:
                    type: string
                    format: date-time
                    description: "Fecha y hora de creación"
                    example: "2024-01-15T10:30:00Z"
                  updatedAt:
                    type: string
                    format: date-time
                    description: "Fecha y hora de última actualización"
                    example: "2024-01-15T10:30:00Z"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    example: "PRODUCT_NOT_FOUND"
                  message:
                    type: string
                    example: "El producto especificado no existe"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    example: "/api/v1/products/prod-12345"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorNotFound
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    description: "Código de error"
                    example: "INTERNAL_ERROR"
                  message:
                    type: string
                    description: "Mensaje descriptivo del error"
                    example: "Ocurrió un error inesperado."
                  timestamp:
                    type: string
                    format: date-time
                    description: "Fecha y hora del error"
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    description: "Ruta donde ocurrió el error"
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInternal

    put:                                # Actualización completa
      summary: Actualizar producto completo
      description: Actualiza todos los datos de un producto existente
      operationId: updateProduct
      tags:
        - products
      parameters:
        - name: productId               # Parámetro de la ruta
          in: path                      # Ubicación: en la URL
          description: ID del producto a actualizar
          required: true                # Los parámetros path son siempre obligatorios
          schema:
            type: string
            pattern: '^prod-[0-9]+$'
          example: "prod-12345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
                - category
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                  example: "Laptop Gaming Pro"
                description:
                  type: string
                  maxLength: 1000
                  example: "Laptop de alto rendimiento para gaming"
                price:
                  type: number
                  format: double
                  minimum: 0
                  example: 1399.99
                category:
                  type: string
                  enum: ["Electronics", "Clothing", "Books", "Home", "Sports"]
                  example: "Electronics"
                inStock:
                  type: boolean
                  example: true
            # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Producto actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - price
                  - category
                  - inStock
                  - sku
                  - createdAt
                properties:
                  id:
                    type: string
                    pattern: '^prod-[0-9]+$'
                    example: "prod-12345"
                  name:
                    type: string
                    example: "Laptop Gaming Pro"
                  price:
                    type: number
                    example: 1399.99
                  category:
                    type: string
                    example: "Electronics"
                  inStock:
                    type: boolean
                    example: true
                  sku:
                    type: string
                    example: "LAP-GAM-001"
                  createdAt:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  updatedAt:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    example: "INVALID_INPUT"
                  message:
                    type: string
                    example: "Los datos enviados no cumplen con el esquema."
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInvalidInput
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    example: "PRODUCT_NOT_FOUND"
                  message:
                    type: string
                    example: "El producto especificado no existe"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    example: "/api/v1/products/prod-12345"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorNotFound
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    description: "Código de error"
                    example: "INTERNAL_ERROR"
                  message:
                    type: string
                    description: "Mensaje descriptivo del error"
                    example: "Ocurrió un error inesperado."
                  timestamp:
                    type: string
                    format: date-time
                    description: "Fecha y hora del error"
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    description: "Ruta donde ocurrió el error"
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInternal

    patch:                              # Actualización parcial
      summary: Actualizar producto parcial
      description: Actualiza solo algunos campos de un producto existente
      operationId: patchProduct
      tags:
        - products
      parameters:
        - name: productId
          in: path
          description: ID del producto a actualizar
          required: true
          schema:
            type: string
            pattern: '^prod-[0-9]+$'
          example: "prod-12345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: "Nombre del producto"
                  example: "Laptop Gaming Pro"
                description:
                  type: string
                  maxLength: 1000
                  description: "Descripción detallada del producto"
                  example: "Laptop de alto rendimiento para gaming"
                price:
                  type: number
                  format: double
                  minimum: 0
                  description: "Precio del producto en USD"
                  example: 1199.99
                category:
                  type: string
                  enum: ["Electronics", "Clothing", "Books", "Home", "Sports"]
                  description: "Categoría del producto"
                  example: "Electronics"
                inStock:
                  type: boolean
                  description: "Indica si el producto está disponible"
                  example: false
            # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/ProductPatch'
      responses:
        '200':
          description: Producto actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - price
                  - category
                  - inStock
                  - sku
                  - createdAt
                properties:
                  id:
                    type: string
                    pattern: '^prod-[0-9]+$'
                    example: "prod-12345"
                  name:
                    type: string
                    example: "Laptop Gaming"
                  price:
                    type: number
                    example: 1199.99
                  category:
                    type: string
                    example: "Electronics"
                  inStock:
                    type: boolean
                    example: false
                  sku:
                    type: string
                    example: "LAP-GAM-001"
                  createdAt:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  updatedAt:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por --> $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    example: "INVALID_INPUT"
                  message:
                    type: string
                    example: "Los datos enviados no cumplen con el esquema."
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInvalidInput
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    example: "PRODUCT_NOT_FOUND"
                  message:
                    type: string
                    example: "El producto especificado no existe"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    example: "/api/v1/products/prod-12345"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorNotFound
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - timestamp
                properties:
                  code:
                    type: string
                    description: "Código de error"
                    example: "INTERNAL_ERROR"
                  message:
                    type: string
                    description: "Mensaje descriptivo del error"
                    example: "Ocurrió un error inesperado."
                  timestamp:
                    type: string
                    format: date-time
                    description: "Fecha y hora del error"
                    example: "2024-01-15T10:30:00Z"
                  path:
                    type: string
                    description: "Ruta donde ocurrió el error"
                    example: "/api/v1/products"
              # 🔄 El "object" definido dentro del "schema" será reemplazado por -> $ref: '#/components/schemas/ApiError'
              # Se agrega "examples" ApiErrorInternal

    delete:                             # Eliminación
      summary: Eliminar producto
      description: Elimina un producto del catálogo
      operationId: deleteProduct 
      tags:
        - products
      parameters:
        - name: productId
          in: path
          description: ID del producto a eliminar
          required: true
          schema:
            type: string
            pattern: '^prod-[0-9]+$'
          example: "prod-12345"
      responses:
        '200':
          description: Producto eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - message
                  - deletedAt
                properties:
